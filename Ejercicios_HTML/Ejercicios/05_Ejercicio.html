  <!-- 
    RETO: Landing Page de "Evento RoboTech 2026 🤖"
    El Objetivo: Crear una página de aterrizaje (Landing Page) para un evento. Debe ser una sola página que informe, resuelva dudas y capture el interés del usuario.

    1. Estructura:
      - Usa un <header> con un <nav> que tenga al menos dos enlaces a secciones de la misma página (usando #id).
      - Divide el contenido principal en secciones para separar la Información general, Preguntas frecuentes y el formulario de registro.
      - Imagen para el evento.
      - Usa un <article> para describir el evento.

    2. Preguntas Frecuentes
      - Crea una sección de "Preguntas Frecuentes".
      - Utiliza exclusivamente las etiquetas <details> y <summary> para que el usuario pueda desplegar las respuestas (por ejemplo: "¿Es gratis?", "¿Cuánto dura el evento?", "¿Dónde se realiza?", "¿Qué nivel de conocimiento necesito?", etc). Mínimo 4 preguntas.

    3. El Formulario de Registro
      - Crea un <form> donde el usuario pueda dejar su nombre, correo y teléfono. Dentro de este formulario, debes incluir:
      - El Botón: Dentro de este botón, añade un icono (puedes usar un emoji como ⚡) y el texto "¡Unirme al evento!" en negrita.

    4. La Zona pie de página
      - Al final, en un <footer>, añade una lista de enlaces con estas funciones específicas:
        * Términos y condiciones
        * Enlace a redes sociales
  -->
  </body>
</html>
