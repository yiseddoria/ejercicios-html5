<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
  <!-- 
    Tu misión es crear "La Gran Tienda de Navidad", una página web completa que sirva tanto para informar como para vender.

    1. El Esqueleto
      <header>: Contiene el título principal <h1> y un menú <nav> con enlaces <a> a las secciones de la página.
      <main>: Aquí irá todo el contenido importante.
      <footer>: Un mensaje de derechos reservados y un enlace a términos legales.

    2. Presentación y Multimedia (El Gancho)
      - Dentro del <main>, crea una sección de "Bienvenida":
        Texto: Un <h2> atractivo y un párrafo <p> sobre la tradición de tus productos navideños.
      - Imagen: Una foto de tu escaparate navideño (<img>).
      - Video: Un pequeño clip de cómo se preparan los dulces navideños o decoraciones.

    3. Información Detallada (Datos y Listas)
      - Crea una sección de "Nuestros Productos":
        - Listas: Usa una <ul> para los tipos de dulces o productos navideños y una <ol> para los "Más Vendidos".
        - Tabla: Una comparativa de precios por unidad o por peso (Producto | Precio | Stock). Usa <th> para las cabeceras.

    4. El Formulario de Pedido: Aquí es donde el usuario interactúa.
      - Crea un campo para el nombre y un campo para el correo.
      - Selección Única: Un grupo de input type="radio" para elegir el tamaño del paquete (Pequeño, Mediano, Grande).
      - Selección Múltiple: Varios input type="checkbox" para elegir extras (Envoltorio de regalo, Sin azúcar, Tarjeta personalizada, etc.).
      - Lista desplegable: para elegir el tipo de dulces o sabores.
      - Comentarios: Un <textarea> para instrucciones especiales de envío.
  -->
  </body>
</html>
