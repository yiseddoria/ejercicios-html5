      El Reto: "La Space-Card"
      Debes escribir el código HTML para una página que contenga lo siguiente:
      - Encabezado: Un título principal con el nombre del astronauta (h1) y un subtítulo con su rol en la misión (h2).
      - Imagen: Una foto del astronauta o explorador espacial (img). No olvides el atributo alt.
      - Descripción: Un párrafo (p) que explique quién es. Dentro de este párrafo, debes:
      - Poner una palabra importante en negrita (strong).
      - Poner una frase con énfasis o cursiva (em).
      - Lista de Habilidades: Una lista desordenada (ul) con al menos 3 habilidades relacionadas con la exploración espacial.
      - Top 3 Misiones: Una lista ordenada (ol) con sus misiones o logros más importantes.
      - Enlace externo: Un link (a) que lleve a una página de NASA, Wikipedia o a una web donde se pueda saber más sobre la exploración espacial.
